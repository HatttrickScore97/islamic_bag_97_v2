workflows:
  default-workflow:
    name: Default Workflow
    environment:
      flutter: 3.22.2
    scripts:
      - name: Fix project before build
        script: |
          flutter clean
          flutter create .
          flutter pub upgrade --major-versions
          flutter pub get
      - name: Build debug APK
        script: |
          flutter build apk --debug --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
