workflows:
  default:
    name: Update and Build
    environment:
      flutter: 3.22.2
      java: 17
    scripts:
      - name: Backup and recreate project
        script: |
          mv lib lib_backup
          mv pubspec.yaml pubspec_backup.yaml
          rm -rf android ios
          flutter create --platforms=android .
          rm -rf lib
          mv lib_backup lib
          mv pubspec_backup.yaml pubspec.yaml
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
