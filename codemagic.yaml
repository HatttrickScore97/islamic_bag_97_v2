workflows:
  default:
    name: Update and Build
    environment:
      flutter: 3.22.2
      java: 17
    scripts:
      - name: Force clean everything
        script: |
          flutter clean
          rm -rf android ios
          rm -f pubspec.lock
          flutter create --platforms=android .
      - name: Restore your code
        script: |
          rm -rf lib
          git checkout HEAD -- lib pubspec.yaml
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
